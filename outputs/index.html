<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>台股全市場策略研究室</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="hero">
    <div class="badge">TAIWAN EQUITY LAB</div>
    <h1>台股日線波段策略研究室</h1>
    <p>官方盤後資料每日更新。以大盤濾網、趨勢、位置與風控產生 Top 名單。不是當沖，也不是保證獲利訊號。</p>
  </header>

  <main class="container">
    <section class="panel status-grid">
      <div>
        <span class="label">資料日期</span>
        <strong id="marketDate">—</strong>
      </div>
      <div>
        <span class="label">產生時間</span>
        <strong id="generatedAt">—</strong>
      </div>
      <div>
        <span class="label">大盤濾網</span>
        <strong id="marketState">—</strong>
      </div>
      <div>
        <span class="label">分析檔數</span>
        <strong id="stockCount">—</strong>
      </div>
    </section>

    <section class="panel controls">
      <label>分類
        <select id="groupSelect">
          <option value="all">全部</option>
          <option value="etf">ETF</option>
          <option value="semiconductor">半導體</option>
          <option value="electronics_ai_server">電子／AI／伺服器</option>
          <option value="finance">金融</option>
          <option value="shipping">航運</option>
          <option value="defensive_telecom">防禦／電信／民生</option>
          <option value="biotech">生技醫療</option>
        </select>
      </label>
      <label>推薦數量
        <select id="topN">
          <option value="3">Top 3</option>
          <option value="5" selected>Top 5</option>
          <option value="10">Top 10</option>
        </select>
      </label>
      <label>資金（TWD）
        <input id="capital" type="number" value="30000" min="1000" step="1000" />
      </label>
      <label>單筆風險
        <select id="riskPct">
          <option value="0.005">0.5%</option>
          <option value="0.01">1%</option>
        </select>
      </label>
      <button id="refreshBtn">重新篩選</button>
    </section>

    <section class="panel">
      <div class="section-head">
        <h2>推薦觀察名單</h2>
        <p id="sourceNote">資料載入中...</p>
      </div>
      <div id="cards" class="cards"></div>
    </section>

    <section class="panel">
      <div class="section-head">
        <h2>全部股票</h2>
        <p>可用搜尋快速找代碼或名稱。</p>
      </div>
      <input id="search" class="search" placeholder="搜尋：2330、台積電、ETF、金融..." />
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>代碼</th><th>名稱</th><th>分類</th><th>價格</th><th>分數</th><th>狀態</th><th>買進區</th><th>停損</th><th>TP2</th>
            </tr>
          </thead>
          <tbody id="stockRows"></tbody>
        </table>
      </div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
